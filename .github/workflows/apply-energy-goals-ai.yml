          replace_regex('src/App.tsx', r"function NetBalanceChart\(.*?\n\}\nfunction ChartLegend", r'''function NetBalanceChart({data,allTimeAverage}:{data:TrendPoint[];allTimeAverage:EnergyAverages|undefined}){
  const[active,setActive]=useState<number|null>(null)
