name: Run energy goals AI patch

on:
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  patch-test-build:
    if: github.head_ref == 'feature/energy-goals-gemini-ai'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/energy-goals-gemini-ai
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Extract and run branch patch
        id: patch
        continue-on-error: true
        run: |
          python - <<'PY'
          from pathlib import Path
          lines = Path('.github/workflows/apply-energy-goals-ai.yml').read_text().splitlines()
          start = next(i for i, line in enumerate(lines) if line.strip() == '- name: Apply source changes')
          run = next(i for i in range(start, len(lines)) if lines[i].strip() == 'run: |')
          end = next(i for i in range(run + 1, len(lines)) if lines[i].startswith('      - name: Install dependencies'))
          body = '\n'.join(line[10:] if line.startswith('          ') else line for line in lines[run + 1:end]) + '\n'
          body = body.replace('re.subn(pattern, replacement, text, count=1, flags=re.S)', 're.subn(pattern, lambda _match: replacement, text, count=1, flags=re.S)')
          Path('/tmp/apply-energy-goals-ai.sh').write_text(body)
          PY
          bash /tmp/apply-energy-goals-ai.sh > /tmp/energy-goals-patch.log 2>&1
          python - <<'PY'
          from pathlib import Path

          test_path = Path('test/energy-goals-ai.test.js')
          test_text = test_path.read_text()
          old_test = "  for (const token of ['runningStrideLength','cardioRecovery','bloodOxygen','walkingHeartRateAverage','contextUpdate','goalUpdates','updatedPlan']) assert.match(mealPlan, new RegExp(token))"
          new_test = "  assert.match(mealPlan, /JSON\\.stringify\\(summary/)\n  assert.match(mealPlan, /buildHealthSummary\\(state\\.dashboard\\)/)\n  const dashboardSource = readFileSync(new URL('../api/_lib/neon-dashboard.js', import.meta.url), 'utf8')\n  for (const token of ['runningStrideLength','cardioRecovery','bloodOxygen','walkingHeartRateAverage']) assert.match(dashboardSource, new RegExp(token))\n  for (const token of ['contextUpdate','goalUpdates','updatedPlan']) assert.match(mealPlan, new RegExp(token))"
          if old_test in test_text:
              test_path.write_text(test_text.replace(old_test, new_test, 1))
          elif 'const dashboardSource' not in test_text:
              raise SystemExit('Expected Gemini health assertion was not found.')

          goals_path = Path('api/_lib/goals.js')
          goals = goals_path.read_text()
          old_objective = "const objective = normalizeObjective(profileInput.objective || current.profile?.objective || objectiveFromPercent(goals.calorieBalancePercent))"
          new_objective = "const objective = normalizeObjective(profileInput.objective || objectiveFromPercent(goals.calorieBalancePercent))"
          if old_objective in goals:
              goals_path.write_text(goals.replace(old_objective, new_objective, 1))

          app_path = Path('src/App.tsx')
          app = app_path.read_text()
          marker = "  const[message,setMessage]=useState('')"
          preview = "  const previewCalories=reference.averageExpenditure==null?reference.calories:Math.round(reference.averageExpenditure*(1+goals.calorieBalancePercent/100))"
          if preview not in app:
              app = app.replace(marker, marker + '\n' + preview, 1)
          app = app.replace('{fmt(reference.calories)} kcal/day', '{fmt(previewCalories)} kcal/day', 1)
          app_path.write_text(app)

          meal_path = Path('api/_lib/meal-plan.js')
          meal = meal_path.read_text()
          retry_end = "    parsed = parseStructuredChatResponse(raw)\n  }\n  const text = limitedText(cleanReplyText(parsed.reply), 12000)"
          hardened = "    parsed = parseStructuredChatResponse(raw)\n  }\n  if (!parsed.valid) throw geminiError('Fuel AI could not produce a complete response. Please try that message again.', 502, 'gemini_incomplete_response')\n  const text = limitedText(cleanReplyText(parsed.reply), 12000)"
          if retry_end in meal:
              meal_path.write_text(meal.replace(retry_end, hardened, 1))
          elif 'gemini_incomplete_response' not in meal:
              raise SystemExit('Could not harden incomplete Gemini response handling.')
          PY

      - name: Upload patch diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: energy-goals-patch-diagnostics
          path: /tmp/energy-goals-patch.log
          if-no-files-found: warn
          retention-days: 1

      - name: Stop after patch failure
        if: steps.patch.outcome == 'failure'
        run: exit 1

      - name: Install dependencies
        run: npm ci

      - name: Verify backend syntax
        run: |
          node --check api/_lib/energy-reference.js
          node --check api/_lib/goals.js
          node --check api/_lib/neon-dashboard.js
          node --check api/_lib/meal-plan.js
          node --check api/mcp.js
          node --check public/meal-plan.js

      - name: Run tests
        id: tests
        continue-on-error: true
        run: npm test > /tmp/energy-goals-tests.log 2>&1

      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: energy-goals-test-diagnostics
          path: /tmp/energy-goals-tests.log
          if-no-files-found: warn
          retention-days: 1

      - name: Stop after test failure
        if: steps.tests.outcome == 'failure'
        run: exit 1

      - name: Build frontend
        id: build
        continue-on-error: true
        run: npm run build > /tmp/energy-goals-build.log 2>&1

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: energy-goals-build-diagnostics
          path: /tmp/energy-goals-build.log
          if-no-files-found: warn
          retention-days: 1

      - name: Stop after build failure
        if: steps.build.outcome == 'failure'
        run: exit 1

      - name: Commit verified source changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add api/_lib/energy-reference.js api/_lib/goals.js api/_lib/neon-dashboard.js api/_lib/meal-plan.js api/mcp.js src/App.tsx src/App.css src/ChartLabels.css public/meal-plan.js public/meal-plan.html package.json test/energy-goals-ai.test.js
          if git diff --cached --quiet; then
            echo "No source changes to commit."
            exit 0
          fi
          git commit -m "Harden dynamic goals and Fuel AI responses"
          git push origin HEAD
