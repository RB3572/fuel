name: Apply faster initial plan generation

on:
  push:
    branches:
      - feature/site-food-delete-gemini-timeout
  pull_request:
    branches:
      - master
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  patch-test-build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/site-food-delete-gemini-timeout
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Apply final plan startup fix
        run: python3 scripts/apply-fast-plan-start.py
      - name: Install dependencies
        run: npm ci
      - name: Verify syntax
        run: |
          node --check api/mlog.js
          node --check api/_lib/meal-plan.js
          node --check public/meal-plan.js
      - name: Run tests
        run: npm test
      - name: Build frontend
        run: npm run build
      - name: Commit verified changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add api/_lib/meal-plan.js public/meal-plan.js public/meal-plan.html test/site-delete-gemini-timeout.test.js
          git commit -m "Start Fuel AI plans without geolocation delay"
          git push origin HEAD:feature/site-food-delete-gemini-timeout
