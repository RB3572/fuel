name: Apply MCP food deletion

on:
  push:
    branches:
      - feature/mcp-delete-food-entry

permissions:
  contents: write

jobs:
  patch-test-build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/mcp-delete-food-entry
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Apply deletion tool patch
        run: python3 scripts/apply-mcp-delete-food-entry.py
      - name: Install dependencies
        run: npm ci
      - name: Verify MCP syntax
        run: node --check api/mcp.js
      - name: Run tests
        run: npm test
      - name: Build frontend
        run: npm run build
      - name: Commit verified source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add api/mcp.js test/mcp-delete-food-entry.test.js
          git commit -m "Add MCP food entry deletion"
          git push origin HEAD:feature/mcp-delete-food-entry
