name: Apply detailed nutrient tracking

on:
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  patch-test-build:
    if: github.head_ref == 'feature/detailed-nutrient-tracking'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/detailed-nutrient-tracking
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply nutrient tracking patch
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path, old, new):
              file = Path(path)
              text = file.read_text()
              if new in text:
                  return
              if old not in text:
                  raise RuntimeError(f'Expected source block not found in {path}: {old[:100]!r}')
              file.write_text(text.replace(old, new, 1))

          def replace_all(path, old, new, expected):
              file = Path(path)
              text = file.read_text()
              if old not in text and new in text:
                  return
              count = text.count(old)
              if count != expected:
                  raise RuntimeError(f'Expected {expected} occurrences in {path}, found {count}: {old[:100]!r}')
              file.write_text(text.replace(old, new))

          def append_once(path, marker, addition):
              file = Path(path)
              text = file.read_text()
              if marker in text:
                  return
              file.write_text(text.rstrip() + '\n' + addition.strip() + '\n')

          replace_once(
              'api/_lib/nutrients.js',
              "aliases: ['caffeine', 'caffeine_mg']",
              "aliases: ['caffeine', 'caffein', 'caffeine_mg']",
