name: Apply expanded Apple Health metrics

on:
  push:
    branches:
      - feature/apple-health-expanded-metrics
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  patch-and-verify:
    if: github.event_name == 'pull_request' || github.event.head_commit.message != 'Support wrist temperature and cardio recovery'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/apple-health-expanded-metrics
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Patch importer, dashboard API, and dashboard UI
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path, old, new):
              file = Path(path)
              text = file.read_text()
              if old not in text:
                  raise SystemExit(f"Missing expected text in {path}: {old!r}")
              file.write_text(text.replace(old, new, 1))

          path = 'api/health/import.js'
          replace_once(path, 'const PARSER_VERSION = 11', 'const PARSER_VERSION = 12')
          replace_once(path,
              '        ADD COLUMN IF NOT EXISTS swimming_strokes double precision',
              '        ADD COLUMN IF NOT EXISTS swimming_strokes double precision,\n'
              '        ADD COLUMN IF NOT EXISTS wrist_temperature double precision,\n'
              '        ADD COLUMN IF NOT EXISTS cardio_recovery_bpm double precision')
          replace_once(path,
              '        partial_day, source, raw_payload, updated_at',
              '        wrist_temperature, cardio_recovery_bpm,\n'
              '        partial_day, source, raw_payload, updated_at')
          replace_once(path,
              "        ${record.partialDay}, 'Apple Shortcuts', ${JSON.stringify(payload)}, now()",
              '        ${record.wristTemperature}, ${record.cardioRecovery},\n'
              "        ${record.partialDay}, 'Apple Shortcuts', ${JSON.stringify(payload)}, now()")
          replace_once(path,
              '        partial_day = EXCLUDED.partial_day,',
              '        wrist_temperature = COALESCE(EXCLUDED.wrist_temperature, health_daily.wrist_temperature),\n'
              '        cardio_recovery_bpm = COALESCE(EXCLUDED.cardio_recovery_bpm, health_daily.cardio_recovery_bpm),\n'
              '        partial_day = EXCLUDED.partial_day,')
          replace_once(path,
              '        cycling_distance_mi, flights_climbed, swimming_strokes, partial_day',
              '        cycling_distance_mi, flights_climbed, swimming_strokes,\n'
              '        wrist_temperature, cardio_recovery_bpm, partial_day')
          replace_once(path,
              "    'flightsClimbed', 'swmStrokes', 'swimmingStrokes'",
              "    'flightsClimbed', 'swmStrokes', 'swimmingStrokes', 'wristTemp', 'wristTemperature',\n"
              "    'cardioRec', 'cardioRecovery', 'walkingHr'")
          replace_once(path,
              "    walkingHeartRateAverage: number(value(payload, ['wlkHRAvg', 'walkingHeartRateAverage', 'walkingHeartRate'])),",
              "    walkingHeartRateAverage: number(value(payload, ['wlkHRAvg', 'walkingHr', 'walkingHeartRateAverage', 'walkingHeartRate'])),")
          replace_once(path,
              "    partialDay: booleanValue(value(payload, ['partialDay'])) ?? true,",
              "    wristTemperature: number(value(payload, ['wristTemp', 'wristTemperature'])),\n"
              "    cardioRecovery: number(value(payload, ['cardioRec', 'cardioRecovery', 'heartRateRecovery'])),\n"
              "    partialDay: booleanValue(value(payload, ['partialDay'])) ?? true,")

          path = 'api/_lib/neon-dashboard.js'
          replace_once(path,
              '      standMinutes: number(health?.stand_minutes),',
              '      wristTemperature: number(health?.wrist_temperature),\n'
              '      cardioRecovery: number(health?.cardio_recovery_bpm),\n'
              '      standMinutes: number(health?.stand_minutes),')
          replace_once(path,
              '    standMinutes: number(todayHealth?.stand_minutes),',
              '    wristTemperature: number(todayHealth?.wrist_temperature),\n'
              '    cardioRecovery: number(todayHealth?.cardio_recovery_bpm),\n'
              '    standMinutes: number(todayHealth?.stand_minutes),')

          path = 'src/App.tsx'
          replace_once(path,
              'swimmingDistanceYards:N; swimmingStrokes:N; standMinutes:N;',
              'swimmingDistanceYards:N; swimmingStrokes:N; wristTemperature:N; cardioRecovery:N; standMinutes:N;')
          replace_once(path,
              'detail="Resting cardiovascular, oxygen, and respiratory measures"',
              'detail="Cardiovascular, oxygen, temperature, and respiratory measures"')
          existing = '{positive(s?.walkingHeartRateAverage)&&<Metric icon={<HeartPulse/>} label="Walking heart rate" value={s?.walkingHeartRateAverage} unit="bpm avg"/>}</section>'
          expanded = '{positive(s?.walkingHeartRateAverage)&&<Metric icon={<HeartPulse/>} label="Walking heart rate" value={s?.walkingHeartRateAverage} unit="bpm avg"/>}{positive(s?.cardioRecovery)&&<Metric icon={<HeartPulse/>} label="Cardio recovery" value={s?.cardioRecovery} unit="bpm" decimals={1}/>} {s?.wristTemperature!=null&&<Metric icon={<Activity/>} label="Wrist temperature" value={s?.wristTemperature} unit="°" decimals={1}/>}</section>'
          replace_once(path, existing, expanded)

          Path('.github/workflows/patch-expanded-health-metrics.yml').unlink()
          PY

      - name: Verify backend syntax
        run: |
          node --check api/health/import.js
          node --check api/_lib/neon-dashboard.js

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Commit verified changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add api/health/import.js api/_lib/neon-dashboard.js src/App.tsx .github/workflows/patch-expanded-health-metrics.yml
          git commit -m "Support wrist temperature and cardio recovery"
          git push origin HEAD
