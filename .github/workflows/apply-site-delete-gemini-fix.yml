name: Apply site deletion and Gemini reliability fixes

on:
  push:
    branches:
      - feature/site-food-delete-gemini-timeout
  pull_request:
    branches:
      - master
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  patch-test-build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/site-food-delete-gemini-timeout
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Prepare patch runner
        run: python3 scripts/prepare-site-delete-gemini-fix.py
      - name: Apply production changes
        run: python3 scripts/apply-site-delete-gemini-fix.py
      - name: Install dependencies
        run: npm ci
      - name: Verify backend and client syntax
        id: syntax
        continue-on-error: true
        run: |
          set -o pipefail
          {
            node --check api/mlog.js
            node --check api/_lib/meal-plan.js
            node --check public/meal-plan.js
          } 2>&1 | tee syntax.log
      - name: Upload syntax diagnostics
        if: steps.syntax.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: site-delete-gemini-syntax
          path: |
            syntax.log
            api/mlog.js
            api/_lib/meal-plan.js
            public/meal-plan.js
      - name: Stop after syntax failure
        if: steps.syntax.outcome == 'failure'
        run: exit 1
      - name: Run tests
        run: npm test
      - name: Build frontend
        run: npm run build
      - name: Commit verified changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add api/mlog.js api/_lib/neon-dashboard.js api/_lib/meal-plan.js src/App.tsx src/App.css public/meal-plan.js public/meal-plan.css public/meal-plan.html test/site-delete-gemini-timeout.test.js
          git commit -m "Add site food deletion and bound Gemini generation"
          git push origin HEAD:feature/site-food-delete-gemini-timeout
