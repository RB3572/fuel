<body>
  <main class="meal-shell chat-only">
    <header class="topbar">
      <div class="brand"><span class="brand-avatar brand-avatar-fallback" aria-hidden="true">U</span><div class="brand-text"><h1>Fuel</h1><p class="brand-date"><span class="date-long"></span><span class="date-short"></span></p></div></div>
      <nav class="user" aria-label="Fuel navigation">
        <a class="nav-icon-button" href="/" aria-label="Dashboard" title="Dashboard"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg><span class="nav-label">Home</span></a>
        <a class="nav-icon-button nav-active" href="/meal-plan.html" aria-current="page" aria-label="Fuel AI" title="Fuel AI"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="m12 3-1.7 4.3L6 9l4.3 1.7L12 15l1.7-4.3L18 9l-4.3-1.7L12 3Z"/><path d="m5 15-.8 2.2L2 18l2.2.8L5 21l.8-2.2L8 18l-2.2-.8L5 15Z"/></svg><span class="nav-label">AI</span></a>
        <a class="nav-icon-button" href="/recipes.html" aria-label="Recipes" title="Recipes"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg><span class="nav-label">Recipes</span></a>
        <a class="nav-icon-button" href="/?view=lifting" aria-label="Lifting" title="Lifting"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="m6.5 6.5 11 11"/><path d="m21 21-1-1"/><path d="m3 3 1 1"/><path d="m18 22 4-4"/><path d="m2 6 4-4"/><path d="m3 10 7-7"/><path d="m14 21 7-7"/></svg><span class="nav-label">Lifting</span></a>
        <a class="nav-icon-button" href="/?view=compare" aria-label="Compare" title="Compare to your age group"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><span class="nav-label">Compare</span></a>
        <a class="nav-icon-button" href="/?view=charts" aria-label="Charts" title="Plot metrics over time"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 3v16a2 2 0 0 0 2 2h16"/><path d="m19 9-5 5-4-4-3 3"/></svg><span class="nav-label">Explore</span></a>
        <div class="fuel-nav-shell">
          <button class="nav-icon-button" id="fuel-menu-btn" type="button" aria-haspopup="true" aria-expanded="false" aria-label="Menu" title="Menu"><svg viewBox="0 0 24 24" aria-hidden="true"><line x1="21" x2="14" y1="4" y2="4"/><line x1="10" x2="3" y1="4" y2="4"/><line x1="21" x2="12" y1="12" y2="12"/><line x1="8" x2="3" y1="12" y2="12"/><line x1="21" x2="16" y1="20" y2="20"/><line x1="12" x2="3" y1="20" y2="20"/><line x1="14" x2="14" y1="2" y2="6"/><line x1="8" x2="8" y1="10" y2="14"/><line x1="16" x2="16" y1="18" y2="22"/></svg><span class="nav-label">More</span></button>
          <div class="fuel-menu" id="fuel-menu" role="menu" hidden><a href="/" role="menuitem"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg>Dashboard</a><button type="button" id="fuel-signout" role="menuitem"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>Sign out</button></div>
        </div>
      </nav>
    </header>

    <section id="status-card" class="status-card card"><div class="status-spinner" aria-hidden="true"></div><p>Checking today’s Fuel data…</p></section>

    <section id="chat-section" class="chat-section card" hidden>
      <div class="chat-actions"><button id="clear-chat-button" class="new-plan-button clear-chat-button" type="button" aria-label="Clear chat history" title="Clear chat"><svg viewBox="0 0 24 24" aria-hidden="true" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg><span>Clear chat</span></button><button id="new-plan-button" class="new-plan-button" type="button" aria-label="Regenerate meal plan" title="New meal plan"><svg viewBox="0 0 24 24" aria-hidden="true" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/></svg><span>New plan</span></button></div>
      <div id="chat-thread" class="chat-thread" aria-live="polite"></div>
      <div id="maps-sources" class="maps-sources" hidden><h3><span translate="no">Google Maps</span> sources</h3><div id="source-list"></div></div>
      <form id="chat-form" class="chat-composer">
        <div id="image-preview" class="image-preview" hidden>
          <img id="preview-img" alt="Food photo ready to log">
          <button id="remove-image" type="button" aria-label="Remove photo">&times;</button>
        </div>
        <textarea id="chat-input" rows="1" maxlength="3000" enterkeyhint="send" autocapitalize="sentences" placeholder="Ask, plan, or log food…" aria-label="Message Fuel AI"></textarea>
        <input id="image-input" type="file" accept="image/*" hidden>
        <button id="attach-button" type="button" aria-label="Attach a food photo" title="Attach a food photo"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3Z"/><circle cx="12" cy="13" r="3.2"/></svg></button>
        <button id="send-button" type="submit" aria-label="Send message" title="Send"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg></button>
      </form>
      <p class="disclaimer">Fuel AI estimates nutrition and can log food to your diary. Verify ingredients, allergies, cross-contact, prices, and availability before ordering or eating.</p>
    </section>
  </main>
  <script src="/meal-plan.js?v=20260723-2" defer></script>
  <script src="/fuel-nav.js?v=20260723-1" defer></script>
  </body>
</html>
