name: Apply detailed nutrient tracking v2

on:
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  patch-test-build:
    if: github.head_ref == 'feature/detailed-nutrient-tracking'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/detailed-nutrient-tracking
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Run corrected nutrient patch
        run: |
          python - <<'PY'
          from pathlib import Path
          import subprocess

          workflow = subprocess.check_output(
              ['git', 'show', 'origin/master:.github/workflows/apply-detailed-nutrients.yml'],
              text=True,
          ).splitlines()
          start = next(i for i, line in enumerate(workflow) if line.strip() == "python - <<'PY'")
          end = next(i for i in range(start + 1, len(workflow)) if workflow[i].strip() == 'PY')
          body = '\n'.join(line[10:] if line.startswith('          ') else line for line in workflow[start + 1:end]) + '\n'
          body = body.replace(".replace(/^          /gm, '')", '')
          Path('/tmp/apply-detailed-nutrients.py').write_text(body)
          PY
          python /tmp/apply-detailed-nutrients.py

      - name: Install dependencies
        run: npm ci

      - name: Verify backend syntax
        run: |
          node --check api/_lib/nutrients.js
          node --check api/_lib/neon-dashboard.js
          node --check api/_lib/meal-plan.js
          node --check api/mcp.js

      - name: Run tests
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Commit verified source changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add api/_lib/nutrients.js api/_lib/neon-dashboard.js api/_lib/meal-plan.js api/mcp.js src/App.tsx src/App.css test/nutrients.test.js
          if git diff --cached --quiet; then
            echo "No source changes to commit."
            exit 0
          fi
          git commit -m "Track detailed food nutrients"
          git push origin HEAD
