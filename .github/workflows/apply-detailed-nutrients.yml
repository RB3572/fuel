              'src/App.tsx',
              "function FoodRow({e}:{e:FoodEntry}){return <article className=\"entry\"><div><strong>{e.food||e.meal}</strong><span>{[e.time,e.meal,e.portion].filter(Boolean).join(' · ')}</span></div><div><strong>{fmt(e.calories)} kcal</strong><span>{fmt(e.protein,1)}g protein · {fmt(e.carbs,1)}g carbs · {fmt(e.fat,1)}g fat</span></div></article>}",
              "function FoodRow({e}:{e:FoodEntry}){const details=[e.nutrients?.sugarsG!=null?`${fmt(e.nutrients.sugarsG,1)}g sugar`:'',e.nutrients?.sodiumMg!=null?`${fmt(e.nutrients.sodiumMg)}mg sodium`:'',e.nutrients?.caffeineMg!=null?`${fmt(e.nutrients.caffeineMg)}mg caffeine`:''].filter(Boolean).join(' · ');return <article className=\"entry\"><div><strong>{e.food||e.meal}</strong><span>{[e.time,e.meal,e.portion].filter(Boolean).join(' · ')}</span>{details&&<span className=\"food-micro\">{details}</span>}</div><div><strong>{fmt(e.calories)} kcal</strong><span>{fmt(e.protein,1)}g protein · {fmt(e.carbs,1)}g carbs · {fmt(e.fat,1)}g fat · {fmt(e.fiber,1)}g fiber</span></div></article>}",
          )

          append_once(
              'src/App.css',
              '.nutrient-grid{',
              """
          .nutrient-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));padding:8px}.nutrient-item{min-width:0;padding:14px 15px;border-right:1px solid #eee;border-bottom:1px solid #eee}.nutrient-item span{display:block;color:#777;font-size:11px}.nutrient-item strong{display:block;margin-top:5px;font-size:20px}.nutrient-item small{margin-left:4px;color:#777;font-size:11px;font-weight:500}.food-micro{color:#44617d!important}@media(max-width:560px){.nutrient-grid{grid-template-columns:repeat(2,minmax(0,1fr));padding:5px}.nutrient-item{padding:12px}.nutrient-item strong{font-size:17px}}
          """,
          )

          Path('test/nutrients.test.js').write_text("""import test from 'node:test'
          import assert from 'node:assert/strict'
          import { readFileSync } from 'node:fs'
          import { nutrientColumns, nutrientSummaryText, nutrientsFromRow, normalizeNutrients, sumNutrients } from '../api/_lib/nutrients.js'

          test('normalizes detailed nutrient aliases and preserves zero values', () => {
            const nutrients = normalizeNutrients({ sugars_g: '12.5 g', addedSugars: 4, sodium: '850 mg', caffein: 0, vitaminB12: '2.4 mcg', omega3: 1.2 })
            assert.deepEqual(nutrients, { sugarsG: 12.5, addedSugarsG: 4, sodiumMg: 850, caffeineMg: 0, vitaminB12Mcg: 2.4, omega3G: 1.2 })
          })

          test('uses first-class nutrient columns as authoritative row values', () => {
            const nutrients = nutrientsFromRow({ nutrients: { sugarsG: 8, sodiumMg: 500, vitaminCMg: 12 }, sugars_g: 10, sodium_mg: 700, caffeine_mg: 80 })
            assert.equal(nutrients.sugarsG, 10)
            assert.equal(nutrients.sodiumMg, 700)
            assert.equal(nutrients.caffeineMg, 80)
            assert.equal(nutrients.vitaminCMg, 12)
            assert.deepEqual(nutrientColumns(nutrients), { sugarsG: 10, addedSugarsG: null, sodiumMg: 700, caffeineMg: 80 })
          })

          test('sums only nutrients that were actually tracked', () => {
            const total = sumNutrients([{ nutrients: { sodiumMg: 200, vitaminCMg: 10 } }, { sodium_mg: 300, nutrients: { caffeineMg: 95 } }])
            assert.deepEqual(total, { sodiumMg: 500, vitaminCMg: 10, caffeineMg: 95 })
            assert.equal(total.calciumMg, undefined)
          })

          test('creates readable nutrient summaries', () => {
            const summary = nutrientSummaryText({ sugarsG: 12, sodiumMg: 500, caffeineMg: 80 })
            assert.match(summary, /Total sugars: 12 g/)
            assert.match(summary, /Sodium: 500 mg/)
            assert.match(summary, /Caffeine: 80 mg/)
          })

          test('wires detailed nutrients through Gemini, MCP, dashboard, and UI', () => {
            const mealPlan = readFileSync(new URL('../api/_lib/meal-plan.js', import.meta.url), 'utf8')
            const mcp = readFileSync(new URL('../api/mcp.js', import.meta.url), 'utf8')
            const dashboard = readFileSync(new URL('../api/_lib/neon-dashboard.js', import.meta.url), 'utf8')
            const app = readFileSync(new URL('../src/App.tsx', import.meta.url), 'utf8')
            for (const source of [mealPlan, mcp, dashboard]) assert.match(source, /nutrients/)
            for (const token of ['sugars_g', 'added_sugars_g', 'sodium_mg', 'caffeine_mg']) {
              assert.match(mealPlan + mcp, new RegExp(token))
            }
            for (const label of ['Detailed nutrition', 'Total sugars', 'Sodium', 'Caffeine', 'Vitamin B12']) assert.match(app, new RegExp(label))
          })
          """.replace(/^          /gm, ''))
          PY

      - name: Install dependencies
        run: npm ci

      - name: Verify backend syntax
        run: |
          node --check api/_lib/nutrients.js
          node --check api/_lib/neon-dashboard.js
          node --check api/_lib/meal-plan.js
          node --check api/mcp.js

      - name: Run tests
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Commit verified source changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add api/_lib/nutrients.js api/_lib/neon-dashboard.js api/_lib/meal-plan.js api/mcp.js src/App.tsx src/App.css test/nutrients.test.js
          if git diff --cached --quiet; then
            echo "No source changes to commit."
            exit 0
          fi
          git commit -m "Track detailed food nutrients"
          git push origin HEAD
